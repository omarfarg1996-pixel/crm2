# Redis Configuration for Commerce AI Core
# Production-ready settings with persistence and security

# Bind to all interfaces in Docker network
bind 0.0.0.0

# Default port
port 6379

# Protect from dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""

# Set max memory policy (important for caching)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence configuration (AOF - Append Only File)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# RDB snapshots for backup
save 900 1
save 300 10
save 60 10000

# Log level
loglevel notice

# Disable protected mode for Docker (security handled by network)
protected-mode no

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Timeout for idle connections (0 = no timeout)
timeout 0

# TCP keepalive
tcp-keepalive 300

# Databases
databases 16

# Slow log configuration
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring threshold (ms)
latency-monitor-threshold 100

# Active defragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100

# Cluster configuration (disabled for single-node dev)
# cluster-enabled no

# TLS configuration (enable in production)
# tls-port 6380
# tls-cert-file /path/to/redis.crt
# tls-key-file /path/to/redis.key
# tls-ca-cert-file /path/to/ca.crt
