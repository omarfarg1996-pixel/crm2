# Commerce AI Core - Docker Compose for Local Development
# بيئة تطوير محلية كاملة مع جميع الخدمات المطلوبة

version: '3.8'

services:
  # ============================================
  # PostgreSQL - قاعدة البيانات الرئيسية
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: commerce-ai-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: commerce_ai_core
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d commerce_ai_core"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - commerce-ai-network

  # ============================================
  # Redis - للتخزين المؤقت و task queues
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: commerce-ai-core-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - commerce-ai-network

  # ============================================
  # Temporal - Durable workflow execution
  # ============================================
  temporal:
    image: temporalio/auto-setup:1.23
    container_name: commerce-ai-core-temporal
    restart: unless-stopped
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=${DATABASE_PASSWORD:-postgres}
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamicconfig/development.yaml
    volumes:
      - ./infra/temporal/dynamicconfig/development.yaml:/etc/temporal/dynamicconfig/development.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - commerce-ai-network

  # ============================================
  # Temporal UI - واجهة إدارة workflows
  # ============================================
  temporal-ui:
    image: temporalio/ui:2.21.3
    container_name: commerce-ai-core-temporal-ui
    restart: unless-stopped
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000,http://localhost:8000
    depends_on:
      - temporal
    networks:
      - commerce-ai-network

  # ============================================
  # Qdrant - Vector database للـ AI memory
  # ============================================
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: commerce-ai-core-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./infra/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - commerce-ai-network

  # ============================================
  # MinIO - S3-compatible object storage
  # ============================================
  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    container_name: commerce-ai-core-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadminpassword}
    volumes:
      - minio_data:/data
      - ./infra/minio/create-buckets.sh:/docker-entrypoint-initdb.d/create-buckets.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - commerce-ai-network

  # ============================================
  # API Service - FastAPI backend
  # ============================================
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: commerce-ai-core-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:${DATABASE_PASSWORD:-postgres}@postgres:5432/commerce_ai_core
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadminpassword}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - LOG_LEVEL=DEBUG
      - ENABLE_AI_DECISIONS=true
      - ENABLE_HUMAN_APPROVAL=true
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./requirements:/app/requirements
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - commerce-ai-network

  # ============================================
  # Worker Service - Background jobs processor
  # ============================================
  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: commerce-ai-core-worker
    restart: unless-stopped
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:${DATABASE_PASSWORD:-postgres}@postgres:5432/commerce_ai_core
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      - LOG_LEVEL=DEBUG
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./packages:/app/packages
      - ./requirements:/app/requirements
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - commerce-ai-network

  # ============================================
  # Workflow Worker - Temporal activities executor
  # ============================================
  workflow_worker:
    build:
      context: .
      dockerfile: infra/docker/workflow-worker.Dockerfile
    container_name: commerce-ai-core-workflow-worker
    restart: unless-stopped
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:${DATABASE_PASSWORD:-postgres}@postgres:5432/commerce_ai_core
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=commerce-ai-core-tasks
      - LOG_LEVEL=DEBUG
    volumes:
      - ./apps/workflow_worker:/app/apps/workflow_worker
      - ./packages:/app/packages
      - ./requirements:/app/requirements
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - commerce-ai-network

  # ============================================
  # AI Engine - LangGraph runtime
  # ============================================
  ai_engine:
    build:
      context: .
      dockerfile: infra/docker/ai-engine.Dockerfile
    container_name: commerce-ai-core-ai-engine
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:${DATABASE_PASSWORD:-postgres}@postgres:5432/commerce_ai_core
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-dev-key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-dev-key}
      - LOG_LEVEL=DEBUG
    volumes:
      - ./apps/ai_engine:/app/apps/ai_engine
      - ./packages:/app/packages
      - ./requirements:/app/requirements
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - commerce-ai-network

  # ============================================
  # Webhook Gateway - External webhook receiver
  # ============================================
  webhook_gateway:
    build:
      context: .
      dockerfile: infra/docker/webhook-gateway.Dockerfile
    container_name: commerce-ai-core-webhook-gateway
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:${DATABASE_PASSWORD:-postgres}@postgres:5432/commerce_ai_core
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      - LOG_LEVEL=DEBUG
    volumes:
      - ./apps/webhook_gateway:/app/apps/webhook_gateway
      - ./packages:/app/packages
      - ./requirements:/app/requirements
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - commerce-ai-network

  # ============================================
  # Web Frontend - Next.js application
  # ============================================
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: development
    container_name: commerce-ai-core-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_APP_NAME=Commerce AI Core
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
    depends_on:
      - api
    networks:
      - commerce-ai-network

# ============================================
# Networks
# ============================================
networks:
  commerce-ai-network:
    driver: bridge
    name: commerce-ai-network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
    name: commerce-ai-core-postgres-data
  redis_data:
    driver: local
    name: commerce-ai-core-redis-data
  qdrant_storage:
    driver: local
    name: commerce-ai-core-qdrant-storage
  minio_data:
    driver: local
    name: commerce-ai-core-minio-data
