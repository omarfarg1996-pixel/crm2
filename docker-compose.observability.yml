# Commerce AI Core - Docker Compose for Observability Stack
# أدوات المراقبة: Prometheus, Grafana, Loki, OpenTelemetry Collector

version: '3.8'

services:
  # ============================================
  # OpenTelemetry Collector
  # ============================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: commerce-ai-core-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infra/observability/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter metrics
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - commerce-ai-network

  # ============================================
  # Prometheus - Metrics storage and querying
  # ============================================
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: commerce-ai-core-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--enable-feature=exemplar-storage'
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - commerce-ai-network

  # ============================================
  # Grafana - Visualization dashboards
  # ============================================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: commerce-ai-core-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - commerce-ai-network

  # ============================================
  # Loki - Log aggregation
  # ============================================
  loki:
    image: grafana/loki:2.9.3
    container_name: commerce-ai-core-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./infra/observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - commerce-ai-network

  # ============================================
  # Promtail - Log shipper for Loki
  # ============================================
  promtail:
    image: grafana/promtail:2.9.3
    container_name: commerce-ai-core-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - commerce-ai-network

  # ============================================
  # Tempo - Distributed tracing backend
  # ============================================
  tempo:
    image: grafana/tempo:2.3.1
    container_name: commerce-ai-core-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo-config.yml"]
    ports:
      - "3200:3200"       # Tempo
      - "4317:4318"       # OTLP HTTP (alternative port)
      - "9411:9411"       # Zipkin
    volumes:
      - ./infra/observability/tempo/tempo-config.yml:/etc/tempo-config.yml:ro
      - tempo_data:/tmp/tempo
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3200/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - commerce-ai-network

  # ============================================
  # Alertmanager - Alert routing and deduplication
  # ============================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: commerce-ai-core-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    volumes:
      - ./infra/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - commerce-ai-network

  # ============================================
  # Node Exporter - Host metrics
  # ============================================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: commerce-ai-core-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - '/:/host:ro,rslave'
    ports:
      - "9100:9100"
    networks:
      - commerce-ai-network

# ============================================
# Networks
# ============================================
networks:
  commerce-ai-network:
    driver: bridge
    name: commerce-ai-network

# ============================================
# Volumes
# ============================================
volumes:
  prometheus_data:
    driver: local
    name: commerce-ai-core-prometheus-data
  grafana_data:
    driver: local
    name: commerce-ai-core-grafana-data
  loki_data:
    driver: local
    name: commerce-ai-core-loki-data
  tempo_data:
    driver: local
    name: commerce-ai-core-tempo-data
  alertmanager_data:
    driver: local
    name: commerce-ai-core-alertmanager-data
